<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="Main">
    <div class="tx-project-participant-list">
        <h2>Teilnehmerliste: {event.title}</h2>

        <f:if condition="{registrations}">
            <f:then>
                <table class="participant-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Anmerkungen</th>
                        </tr>
                    </thead>
                    <tbody>
                        <f:for each="{registrations}" as="registration">
                            <tr class="registration-status--{registration.status}">
                                <td>
                                    {registration.feUser.firstName} {registration.feUser.lastName}
                                </td>
                                <td>{registration.status}</td>
                                <td>{registration.notes}</td>
                            </tr>
                        </f:for>
                    </tbody>
                </table>
            </f:then>
            <f:else>
                <p>Noch keine Anmeldungen vorhanden.</p>
            </f:else>
        </f:if>

        <f:link.action action="show" controller="Event" arguments="{event: event}">← Zurück zum Termin</f:link.action>
    </div>
</f:section>
</html>
